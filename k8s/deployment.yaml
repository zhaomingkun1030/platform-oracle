# =============================================================================
# Platform Oracle - Kubernetes Deployment Configuration
# =============================================================================
# 
# ⚠️  SECURITY WARNING: This file contains placeholder values only!
# 
# DO NOT commit actual secrets to GitHub!
#
# Before deploying, you MUST replace the placeholder secrets below:
#   1. Create a K8s secret manually, OR
#   2. Use external secret management (Vault, AWS Secrets Manager, etc.)
#
# Quick setup:
#   kubectl create secret generic platform-oracle-secret \
#     -n platform-oracle-preproduct \
#     --from-literal=LLM_API_KEY='your-actual-api-key' \
#     --from-literal=ADMIN_PASSWORD='your-secure-password' \
#     --from-literal=SECRET_KEY='your-jwt-secret-key'
#
# Supported LLM Providers:
#   - alibaba: Alibaba Cloud DashScope (use coding.dashscope.aliyuncs.com for GLM models)
#   - azure: Azure OpenAI
#   - google: Google Gemini
#   - openai: OpenAI
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: platform-oracle-preproduct
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-oracle-config
  namespace: platform-oracle-preproduct
data:
  # LLM Provider: alibaba, azure, google, openai
  LLM_PROVIDER: "alibaba"
  # API URL (examples):
  #   Alibaba: https://coding.dashscope.aliyuncs.com/v1
  #   Azure: https://your-resource.openai.azure.com/openai/v1/
  #   Google: (not needed, uses google_api_key)
  #   OpenAI: https://api.openai.com/v1
  LLM_API_URL: "https://coding.dashscope.aliyuncs.com/v1"
  # Model name (examples):
  #   Alibaba: glm-5, qwen-plus
  #   Azure: gpt-4, gpt-35-turbo
  #   Google: gemini-2.0-flash-lite
  #   OpenAI: gpt-4, gpt-3.5-turbo
  LLM_MODEL: "glm-5"
  # Azure deployment name (only needed for Azure)
  AZURE_OPENAI_DEPLOYMENT_NAME: ""
  # Admin username
  ADMIN_USERNAME: "admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-oracle-secret
  namespace: platform-oracle-preproduct
type: Opaque
stringData:
  # ⚠️ REPLACE THESE WITH YOUR ACTUAL VALUES BEFORE DEPLOYING!
  # LLM API Key - Get from your LLM provider's console
  LLM_API_KEY: "YOUR_LLM_API_KEY_HERE"
  # Admin password for web UI login
  ADMIN_PASSWORD: "YOUR_ADMIN_PASSWORD_HERE"
  # JWT secret key (generate a random string)
  SECRET_KEY: "YOUR_JWT_SECRET_KEY_HERE"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-oracle-pvc
  namespace: platform-oracle-preproduct
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-oracle
  namespace: platform-oracle-preproduct
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-oracle
  template:
    metadata:
      labels:
        app: platform-oracle
    spec:
      containers:
      - name: backend
        image: ghcr.io/zhaomingkun1030/platform-oracle:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: platform-oracle-config
        - secretRef:
            name: platform-oracle-secret
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: platform-oracle-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: platform-oracle
  namespace: platform-oracle-preproduct
spec:
  selector:
    app: platform-oracle
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP