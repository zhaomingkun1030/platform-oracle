  SECRET_KEY: "platform-oracle-secret-key-change-in-production"
  LLM_PROVIDER: "google"
  LLM_API_URL: "http://your-llm-service:8000/v1"
  LLM_MODEL: "gpt-4"
  SECRET_KEY: "platform-oracle-secret-key-change-in-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-oracle-secret
  namespace: default
type: Opaque
stringData:
  LLM_API_KEY: "AIzaSyCYbrzSRn3Wa6CIl43mEAj8LVahvfCKtMQ"
  LLM_API_KEY: "your-api-key-here"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-oracle-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-oracle
