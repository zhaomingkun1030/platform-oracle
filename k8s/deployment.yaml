    spec:
      containers:
      - name: backend
        image: ghcr.io/zhaomingkun1030/platform-oracle:latest
        image: your-registry/platform-oracle:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: platform-oracle-config
        - secretRef:
            name: platform-oracle-secret
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
