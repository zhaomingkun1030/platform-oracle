---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-oracle
  namespace: default
spec:
  rules:
  - host: platform-oracle.your-cluster.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: platform-oracle
            port:
              number: 80
